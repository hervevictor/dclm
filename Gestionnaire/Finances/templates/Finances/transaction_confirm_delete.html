{% extends 'base.html' %}
{% load static %}

{% block gestion %}
<div class="container mt-5">
    <div class="card border-danger shadow-sm col-md-6 mx-auto text-center">
        <div class="card-header bg-danger text-white py-3">
            <h4 class="mb-0">Confirmer la suppression</h4>
        </div>
        <div class="card-body py-4">
            <p class="lead">Voulez-vous vraiment supprimer la transaction :</p>
            <h5 class="fw-bold mb-4">"{{ object.titre }}" ({{ object.montant|floatformat:2 }} FCFA) ?</h5>

            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger px-4">Supprimer définitivement</button>
                <a href="{% url 'transaction_list' %}" class="btn btn-outline-secondary px-4 ms-2">Annuler</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
