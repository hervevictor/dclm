{% extends 'base.html' %}
{% block gestion %}
<div class="container-fluid mt-4" style="max-width:700px;">
  <div class="card shadow-sm border-0">
    <div class="card-header fw-semibold" style="background:#f0fff4; border-left:4px solid #198754;">
      <i class="bi bi-cash-coin text-success"></i> Enregistrer un versement
    </div>
    <div class="card-body">
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Église</label>
          {{ form.eglise }}
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Montant versé (FCFA)</label>
          {{ form.montant }}
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Date du versement</label>
          {{ form.date }}
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Photo du reçu <span class="text-muted fw-normal">(facultatif)</span></label>
          {{ form.photo_recu }}
          <div class="form-text">Joindre la photo ou scan du reçu bancaire.</div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Observations</label>
          {{ form.description }}
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-success"><i class="bi bi-check-circle"></i> Enregistrer</button>
          <a href="{% url 'versement_list' %}" class="btn btn-outline-secondary">Annuler</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
