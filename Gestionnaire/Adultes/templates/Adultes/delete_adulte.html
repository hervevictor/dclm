{% extends 'base.html' %}
{% block gestion %} <br>
    <h1>Delete {{adulte}} </h1>
    <br>
    <p>Êtes-vous sûr de vouloir supprimer : {{adulte}} ?</p>
    <p> <strong>Valider</strong>  pour confirmer ou <strong>Abandonner</strong>  pour annuler</p>
    <form action="" method="post">
        {% csrf_token %} 
        <br><br>
        <a href="{% url 'adulte_details' adulte.pk %}" class="btn btn-warning">Abandonner</a>
        <button type="submit" class="btn btn-danger">Valider</button>
    </form>
    <br><br><br>
{% endblock %}
