<div class="row mb-4">
  <div class="col">
    <div class="card border-primary text-center shadow-sm">
      <div class="card-body py-3">
        <div class="small text-muted">Hommes</div>
        <h4 class="text-primary mb-0">{{ total_hommes }}</h4>
      </div>
    </div>
  </div>
  <div class="col">
    <div class="card border-info text-center shadow-sm">
      <div class="card-body py-3">
        <div class="small text-muted">Femmes</div>
        <h4 class="text-info mb-0">{{ total_femmes }}</h4>
      </div>
    </div>
  </div>
  <div class="col">
    <div class="card border-warning text-center shadow-sm">

        <h4 class="text-warning mb-0">{{ total_enfants }}</h4>
      </div>
    </div>

  <div class="col">

        <h4 class="mb-0">{{ total_participants }}</h4>
      </div>
    </div>
  </div>
  <div class="col">

        <div class="small text-muted">Nouveaux convertis</div>
        <h4 class="text-success mb-0">{{ total_convertis }}</h4>
      </div>
    </div>
  </div>
  <div class="col">
    <div class="card border-dark text-center shadow-sm">
      <div class="card-body py-3">
        <div class="small text-muted">Bilans</div>
        <h4 class="mb-0">{{ bilan_count }}</h4>
      </div>
