{% comment %}
Partial : filtres date (interval + mois + jour) pour les vues GCK.
Requis dans le contexte : start_date, end_date, mois, jour, mois_fr, reset_url
{% endcomment %}
<form method="get" class="row g-2 align-items-end">
  <div class="col-md-2">
    <label class="form-label small mb-1">Du</label>
    <input type="date" name="start_date" class="form-control form-control-sm" value="{{ start_date }}">
  </div>
  <div class="col-md-2">
    <label class="form-label small mb-1">Au</label>
    <input type="date" name="end_date" class="form-control form-control-sm" value="{{ end_date }}">
  </div>
  <div class="col-md-2">
    <label class="form-label small mb-1">Mois</label>
    <select name="mois" class="form-select form-select-sm">
      {% for val, label in mois_fr %}
      <option value="{{ val }}" {% if mois == val %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-1">
    <label class="form-label small mb-1">Jour</label>
    <input type="number" name="jour" class="form-control form-control-sm"
           min="1" max="31" value="{{ jour }}" placeholder="1-31">
  </div>
  <div class="col-md-2 d-flex gap-1">
    <button type="submit" class="btn btn-primary btn-sm w-100">
      <i class="bi bi-funnel"></i> Filtrer
    </button>
    <a href="{{ reset_url }}" class="btn btn-outline-secondary btn-sm" title="Réinitialiser">&#x21BA;</a>
  </div>
</form>
