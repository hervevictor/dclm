{% extends 'base.html' %}
{% block gestion %} <br>
    <h1>Delete {{jeune}} </h1>
    <br>
    <p>Êtes-vous sûr de vouloir supprimer : {{jeune}} ?</p>
    <p> <strong>Valider</strong>  pour confirmer ou <strong>Abandonner</strong>  pour annuler</p>
    <form action="" method="post">
        {% csrf_token %}
        <a href="{% url 'jeune_details' jeune.pk %}" class="btn btn-warning">Abandonner</a>
        <button type="submit" class="btn btn-danger">Valider</button>
    </form>
{% endblock %}
