{% extends 'base.html' %}
{% block gestion %}
<div class="container-fluid mt-4" style="max-width:600px;">
  <div class="card shadow-sm border-0">
    <div class="card-header fw-semibold" style="background:#f0f4ff; border-left:4px solid #0d6efd;">
      <i class="bi bi-pie-chart text-primary"></i> {{ titre }}
    </div>
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
          <div class="text-danger small mt-1">{{ field.errors }}</div>
          {% endif %}
        </div>
        {% endfor %}
        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Enregistrer</button>
          <a href="{% url 'quota_national' %}" class="btn btn-outline-secondary">Annuler</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
