{% extends 'base.html' %}
{% block gestion %}
<div class="container mt-4" style="max-width:540px;">
  <div class="card shadow-sm border-0">
    <div class="card-header bg-white border-0 py-3">
      <h5 class="mb-0 fw-bold"><i class="bi bi-hand-thumbs-up text-primary me-2"></i>{{ titre }}</h5>
      <div class="text-muted small mt-1">{{ quota.eglise.nom }} · Quota {{ quota.annee }}</div>
    </div>
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors.0 }}</div>{% endif %}
        </div>
        {% endfor %}
        <div class="d-flex gap-2 mt-3">
          <button type="submit" class="btn btn-success"><i class="bi bi-check-lg me-1"></i>Enregistrer</button>
          <a href="{% url 'quota_eglise_detail' quota.pk %}" class="btn btn-outline-secondary">Annuler</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
