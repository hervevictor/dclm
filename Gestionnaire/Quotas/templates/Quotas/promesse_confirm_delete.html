{% extends 'base.html' %}
{% block gestion %}
<div class="container mt-4" style="max-width:480px;">
  <div class="card shadow-sm border-0">
    <div class="card-body text-center py-4">
      <i class="bi bi-exclamation-triangle-fill text-danger fs-1 mb-3 d-block"></i>
      <h5 class="fw-bold">Supprimer la promesse ?</h5>
      <p class="text-muted">{{ object.nom_membre }} — {{ object.montant_promis|floatformat:0 }} FCFA</p>
      <form method="post" class="d-flex justify-content-center gap-2 mt-3">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Oui, supprimer</button>
        <a href="{% url 'quota_eglise_detail' object.quota_eglise.pk %}" class="btn btn-outline-secondary">Annuler</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
