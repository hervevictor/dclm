{% extends 'base.html' %}
{% block gestion %}
<div class="container-fluid mt-4" style="max-width:500px;">
  <div class="card shadow-sm border-0 border-danger">
    <div class="card-header bg-danger text-white fw-semibold">
      <i class="bi bi-trash3-fill"></i> Supprimer le quota
    </div>
    <div class="card-body">
      <p>Supprimer le quota de <strong>{{ object.montant|floatformat:0 }} FCFA</strong> attribué à <strong>{{ object.eglise.nom }}</strong> ({{ object.annee }}) ?</p>
      <form method="post">
        {% csrf_token %}
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-danger"><i class="bi bi-trash3"></i> Supprimer</button>
          <a href="{% url 'quota_national' %}" class="btn btn-outline-secondary">Annuler</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
