{% extends 'base.html' %}
{% block gestion %}

<div class="container-fluid mt-4" style="max-width:600px;">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0"><i class="bi bi-pencil-fill text-primary"></i> Modifier mes informations</h4>
    <a href="{% url 'profil' %}" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-arrow-left"></i> Mon profil
    </a>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body py-4 px-4">
      <form method="post">
        {% csrf_token %}

        {% for field in form %}
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ field.label }}</label>
          {{ field }}
          {% if field.help_text %}
            <div class="form-text text-muted">{{ field.help_text }}</div>
          {% endif %}
          {% for error in field.errors %}
            <div class="text-danger small mt-1"><i class="bi bi-exclamation-circle"></i> {{ error }}</div>
          {% endfor %}
        </div>
        {% endfor %}

        <hr class="my-4">

        <div class="d-flex gap-2 justify-content-end">
          <a href="{% url 'profil' %}" class="btn btn-outline-secondary">Annuler</a>
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-circle-fill"></i> Enregistrer
          </button>
        </div>
      </form>
    </div>
  </div>

</div>
{% endblock %}
