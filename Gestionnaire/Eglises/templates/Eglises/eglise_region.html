{% extends "base.html" %}
 {% load static %}
{% block gestion %}
    <h3>nombre d'église dans cette region ({{regs}}) : <strong> {{eglise_nombre}} </strong> </h3>
    <br>

    <section class="container-fluid">
        <div class="row"> 
        {% for eglise in eglises %}
            <div class="col-md-4">
            <div class="card">
                {% if eglise.header_image %}
                  <img src="{{eglise.header_image.url}}" class="card-img-top" alt="...">
                  {% else %}
                  <img src="{% static 'assets/img/card.jpg' %}" class="card-img-top" alt="...">
                {% endif %}
                
                <div class="card-body">
                    <h5 class="card-title"><a href="{% url 'eglise_details' eglise.pk %}">{{eglise}}</a></h5>
                    <p class="card-text"></p>
                </div>
                </div>
            </div>
        {% endfor %}
        </div>
    </section> 
{% endblock  %}
