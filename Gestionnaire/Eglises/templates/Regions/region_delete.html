{% extends 'base.html' %}
{% block gestion %}
<div class="container-fluid mt-4" style="max-width:520px;">
  <div class="card shadow-sm border-0 border-danger" style="border-top: 4px solid #dc3545 !important;">
    <div class="card-body text-center py-5">
      <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:3rem;"></i>
      <h5 class="fw-bold mt-3">Supprimer la région « {{ region.name }} » ?</h5>
      <p class="text-muted small">Cette action est irréversible.</p>
      <form method="post" class="d-flex gap-2 justify-content-center mt-4">
        {% csrf_token %}
        <a href="{% url 'region_details' region.pk %}" class="btn btn-outline-secondary">Annuler</a>
        <button type="submit" class="btn btn-danger"><i class="bi bi-trash3-fill"></i> Confirmer la suppression</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
