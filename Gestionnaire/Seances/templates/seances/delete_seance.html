{% extends 'base.html' %}
{% block gestion %} <br>
    <h1>Suppression du bilan des séances </h1>
    <br>
    <p>Êtes-vous sûr de vouloir supprimer le bilan de cette seance ({{bilan.seance}}  {{bilan.date}}) ?</p>
    <p> <strong>Valider</strong>  pour confirmer ou <strong>Abandonner</strong>  pour annuler</p>
    <form action="" method="post">
        {% csrf_token %}<br><br>
        <a href="{% url 'seance_details' bilan.pk %}" class="btn btn-warning">Abandonner</a>
        <button type="submit" class="btn btn-danger">Valider</button>
    </form>
    <br><br><br><br><br><br><br>
{% endblock %}
