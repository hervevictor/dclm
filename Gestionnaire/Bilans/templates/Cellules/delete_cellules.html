{% extends 'base.html' %}
{% block gestion %} <br> <br>
    <h2>Supprimer {{cellule}} </h2>
    <br>
    <p>Êtes-vous sûr de vouloir supprimer : {{cellule}} ?</p>
    <p> <strong>Valider</strong>  pour confirmer ou <strong>Abandonner</strong>  pour annuler</p>
    <form action="" method="post">
        {% csrf_token %}
        <br> <br>
        <a href="{% url 'cellules_detail' cellule.pk %}" class="btn btn-warning">Abandonner</a>
        <br> <br>
        <button type="submit" class="btn btn-danger">Valider</button>
    </form>

    <br> <br><br> <br>
{% endblock %}
