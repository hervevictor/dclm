{% extends 'base.html' %}
{% block gestion %}
<div class="container-fluid mt-4" style="max-width:500px;">
  <div class="card shadow-sm border-0 border-danger">
    <div class="card-header bg-danger text-white fw-semibold">
      <i class="bi bi-trash3-fill"></i> Supprimer ce nouveau venu
    </div>
    <div class="card-body">
      <p>Supprimer <strong>{{ object.nom_complet }}</strong> ({{ object.eglise.nom }}, {{ object.date_venue|date:"d/m/Y" }}) ?</p>
      <form method="post">
        {% csrf_token %}
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-danger"><i class="bi bi-trash3"></i> Supprimer</button>
          <a href="{% url 'nouveau_venu_liste' %}" class="btn btn-outline-secondary">Annuler</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
